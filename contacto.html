<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="stile14.css">
</head>
<body>
    <div id="inicio">
    <main class="form-signin w-100 m-auto"> <form> 
        <img class="mb-4" src="/docs/5.3/assets/brand/bootstrap-logo.svg" alt="" width="72" height="57"> 
        <h1 class="h3 mb-3 fw-normal"><font dir="auto" style="vertical-align: inherit;"><font dir="auto" style="vertical-align: inherit;">Por favor, inicia sesión</font></font></h1> 
        <div class="form-floating"> 
            <input type="email" class="form-control" id="floatingInput" placeholder="nombre@ejemplo.com"> 
            <label for="floatingInput"><font dir="auto" style="vertical-align: inherit;"><font dir="auto" style="vertical-align: inherit;">Dirección de correo electrónico</font></font></label> </div> 
            <div class="form-floating"> 
                <input type="password" class="form-control" id="floatingPassword" placeholder="Contraseña"> 
                <label for="floatingPassword"><font dir="auto" style="vertical-align: inherit;"><font dir="auto" style="vertical-align: inherit;">Contraseña</font></font></label> </div> 
                <div class="form-check text-start my-3"> 
                    <input class="form-check-input" type="checkbox" value="remember-me" id="checkDefault"> 
                    <label class="form-check-label" for="checkDefault"><font dir="auto" style="vertical-align: inherit;"><font dir="auto" style="vertical-align: inherit;">Acuérdate de mí</font></font></label> </div> 
                    <button class="btn btn-primary w-100 py-2" type="submit"><font dir="auto" style="vertical-align: inherit;"><font dir="auto" style="vertical-align: inherit;">Iniciar sesión</font></font></button> 
                    <p class="mt-5 mb-3 text-body-secondary"><font dir="auto" style="vertical-align: inherit;"><font dir="auto" style="vertical-align: inherit;">© 2017–2025</font></font></p> </form> 
    </main>
    </div>
</body>
</html>
